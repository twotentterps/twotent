<!DOCTYPE html>
<html>
<head>
    <title>two tent terps</title>
    <style>
        body {
            background-color: black;
            color: #00ff00;
            font-family: monospace;
            text-align: center;
            padding-top: 80px;
        }

        .logo {
            font-size: 42px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff00;
        }

        .subtitle {
            margin-bottom: 50px;
            color: #00cc00;
        }

        .cmd {
            display: block;
            margin: 12px auto;
            width: 300px;
            text-align: left;
            padding: 10px;
            border: 1px solid #00ff00;
            color: #00ff00;
            text-decoration: none;
            transition: 0.3s;
        }

        .cmd:hover {
            background-color: #00ff00;
            color: black;
        }

        .prompt {
            color: #00ff00;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            background-color: #00ff00;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { background-color: transparent; }
        }
    </style>
</head>
<body>

<div class="logo">> two tent terps</div>
<div class="subtitle">> links | content | community</div>

<a class="cmd" href="https://github.com/yourusername" target="_blank">
    <span class="prompt">$</span> open github
</a>

<a class="cmd" href="https://t.me/twotentterps">
    <span class="prompt">$</span> open telegram
</a>

<a class="cmd" href="https://www.instagram.com/twotentterps?igsh=MTVsYTRpdTVrb2d3eg%3D%3D&utm_source=qr">
    <span class="prompt">$</span> open instagram
</a>

<a class="cmd" href="mailto:hitusup@twotentterps.shop">
    <span class="prompt">$</span> send email
</a>

<!-- 🎧 Hacker Music Overlay -->
<style>
  #music-bar {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #0d1117;
    border: 1px solid #00ff9c;
    color: #00ff9c;
    font-family: monospace;
    padding: 10px 15px;
    border-radius: 8px;
    box-shadow: 0 0 10px #00ff9c55;
    z-index: 9999;
  }

  #music-bar button {
    background: transparent;
    border: 1px solid #00ff9c;
    color: #00ff9c;
    padding: 5px 10px;
    margin-right: 10px;
    cursor: pointer;
    font-family: monospace;
  }

  #music-bar button:hover {
    background: #00ff9c;
    color: #0d1117;
  }

  #spotify-player {
    position: fixed;
    bottom: 80px;
    right: 20px;
    display: none;
    z-index: 9999;
  }
</style>

<div id="music-bar">
  <span>▶ TWOTENTTERPS RADIO</span>
  <button onclick="togglePlayer()">SHOW</button>
</div>

<div id="spotify-player">
  <iframe style="border-radius:12px"
    src="https://open.spotify.com/embed/playlist/3rZFVoXgqSaIOSkBWzl0Qs"
    width="300"
    height="152"
    frameborder="0"
    allow="autoplay; clipboard-write; encrypted-media;">
  </iframe>
</div>

<script>
function togglePlayer() {
  const player = document.getElementById("spotify-player");
  const button = document.querySelector("#music-bar button");

  if (player.style.display === "none") {
    player.style.display = "block";
    button.textContent = "HIDE";
  } else {
    player.style.display = "none";
    button.textContent = "SHOW";
  }
}
</script>

<p style="margin-top:50px;">
    <span class="prompt">$</span> system ready<span class="cursor"></span>
</p>

</body>
</html>
