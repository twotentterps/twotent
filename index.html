<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>two tent terps</title>

<style>
body {
    background-color: black;
    color: #00ff00;
    font-family: monospace;
    text-align: center;
    padding: 60px 15px 120px;
    margin: 0;
}

/* TEXT */
.logo {
    font-size: 42px;
    margin-bottom: 10px;
    text-shadow: 0 0 10px #00ff00;
}

.subtitle {
    margin-bottom: 40px;
    color: #00cc00;
}

.prompt {
    color: #00ff00;
}

.cursor {
    display: inline-block;
    width: 10px;
    background-color: #00ff00;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { background-color: transparent; }
}

/* LINKS */
.cmd {
    display: block;
    margin: 12px auto;
    width: 100%;
    max-width: 320px;
    text-align: left;
    padding: 14px;
    border: 1px solid #00ff00;
    color: #00ff00;
    text-decoration: none;
    transition: 0.3s;
}

.cmd:hover {
    background-color: #00ff00;
    color: black;
}

/* 🎧 MUSIC */
#music-bar {
    position: fixed;
    bottom: 15px;
    right: 15px;
    background: #0d1117;
    border: 1px solid #00ff9c;
    color: #00ff9c;
    padding: 10px 12px;
    border-radius: 8px;
    box-shadow: 0 0 12px #00ff9c55;
    z-index: 9999;
    font-size: 13px;
}

#music-bar button {
    background: transparent;
    border: 1px solid #00ff9c;
    color: #00ff9c;
    padding: 4px 8px;
    margin-left: 8px;
    cursor: pointer;
}

#music-bar button:hover {
    background: #00ff9c;
    color: #0d1117;
}

#spotify-player {
    position: fixed;
    bottom: 70px;
    right: 15px;
    display: none;
    z-index: 9999;
    width: 90vw;
    max-width: 320px;
}

/* 📱 MOBILE */
@media (max-width: 600px) {
    .logo { font-size: 28px; }
    .subtitle { font-size: 14px; }
    .cmd { font-size: 14px; padding: 12px; }

    #music-bar {
        left: 50%;
        transform: translateX(-50%);
        right: auto;
        width: 90%;
        text-align: center;
    }

    #spotify-player {
        left: 50%;
        transform: translateX(-50%);
        right: auto;
    }
}

/* 🖥️ BOOT SCREEN */
#boot-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    color: #00ff00;
    padding: 20px;
    z-index: 99999;
}

#boot-text {
    white-space: pre-wrap;
}
</style>
</head>

<body>

<!-- 🖥️ BOOT SCREEN -->
<div id="boot-screen">
  <pre id="boot-text"></pre>
</div>

<!-- 🌐 MAIN SITE -->
<div id="main-site" style="display:none;">

  <div class="logo">> two tent terps</div>
  <div class="subtitle">> links | content | community</div>

  <a class="cmd" href="https://www.youtube.com/@twotentterps" target="_blank">
      <span class="prompt">$</span> open youtube
  </a>

  <a class="cmd" href="https://t.me/twotentterps">
      <span class="prompt">$</span> open telegram
  </a>

  <a class="cmd" href="https://www.instagram.com/twotentterps" target="_blank">
      <span class="prompt">$</span> open instagram
  </a>

  <a class="cmd" href="mailto:hitusup@twotentterps.shop">
      <span class="prompt">$</span> send email
  </a>

  <!-- 🎧 MUSIC -->
  <div id="music-bar">
    ▶ RADIO
    <button onclick="togglePlayer()">PLAY</button>
  </div>

  <div id="spotify-player">
    <iframe style="border-radius:12px; width:100%;"
      src="https://open.spotify.com/embed/playlist/3rZFVoXgqSaIOSkBWzl0Qs"
      height="152"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media;">
    </iframe>
  </div>

  <p style="margin-top:50px;">
      <span class="prompt">$</span> system ready<span class="cursor"></span>
  </p>

</div>

<!-- 🧠 BOOT SCRIPT -->
<script>
const bootLines = [
  "> initializing system...",
  "> connecting to network...",
  "> starting radio service...",
  "> access granted",
  "> welcome to twotentterps"
];

let line = 0;
let char = 0;

function typeBoot() {
  if (line < bootLines.length) {
    if (char < bootLines[line].length) {
      document.getElementById("boot-text").textContent += bootLines[line].charAt(char);
      char++;
      setTimeout(typeBoot, 30);
    } else {
      document.getElementById("boot-text").textContent += "\n";
      line++;
      char = 0;
      setTimeout(typeBoot, 300);
    }
  } else {
    setTimeout(() => {
      document.getElementById("boot-screen").style.display = "none";
      document.getElementById("main-site").style.display = "block";
    }, 500);
  }
}

typeBoot();
</script>

<!-- 🎧 MUSIC SCRIPT -->
<script>
let isOpen = false;

function togglePlayer() {
  const player = document.getElementById("spotify-player");
  const button = document.querySelector("#music-bar button");

  isOpen = !isOpen;

  if (isOpen) {
    player.style.display = "block";
    button.textContent = "HIDE";
  } else {
    player.style.display = "none";
    button.textContent = "PLAY";
  }
}
</script>

</body>
</html>
